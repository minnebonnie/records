<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6c5ce7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bunny Tools">
<title>Bunny Tools</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');

:root {
    --primary: #6c5ce7;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #2d3436;
    --sub: #8a8f98;
    --border: #e6e8ee;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    padding: 18px;
    padding-top: max(18px, env(safe-area-inset-top));
    background: var(--bg);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
}

.container {
    max-width: 760px;
    margin: 0 auto;
}

.hero {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: 0 12px 30px rgba(108, 92, 231, 0.22);
    margin-bottom: 18px;
}

.hero h1 {
    margin: 0;
    font-size: 1.8rem;
    font-weight: 900;
}

.hero p {
    margin: 10px 0 0;
    line-height: 1.5;
    font-size: 0.95rem;
    opacity: 0.92;
}

.section-title {
    margin: 22px 4px 12px;
    font-size: 0.95rem;
    color: var(--sub);
    font-weight: 900;
}

.app-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
}

.app-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border-radius: 22px;
    padding: 18px;
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--border);
    box-shadow: 0 4px 14px rgba(0,0,0,0.035);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.app-card:active {
    transform: scale(0.985);
}

.icon {
    width: 52px;
    height: 52px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    font-size: 1.55rem;
    flex-shrink: 0;
}

.purple { background: #f0edff; }
.blue { background: #e7f5ff; }
.green { background: #ebfbee; }
.yellow { background: #fff8db; }
.pink { background: #fff0f6; }
.gray { background: #f1f3f5; }

.app-info {
    flex: 1;
}

.app-title {
    font-weight: 900;
    font-size: 1.05rem;
    margin-bottom: 5px;
}

.app-desc {
    color: var(--sub);
    font-size: 0.82rem;
    line-height: 1.4;
}

.arrow {
    color: #b0b5bd;
    font-size: 1.3rem;
    font-weight: 900;
}

.footer {
    text-align: center;
    color: var(--sub);
    font-size: 0.75rem;
    margin-top: 26px;
    padding-bottom: 20px;
}

@media (min-width: 640px) {
    .app-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>
<div class="container">
    <div class="hero">
        <h1>바니의 기록 도구함 🐰</h1>
        <p>필요한 기록을 빠르게 열고, 나만의 흐름을 쌓아가는 개인 웹앱 모음집</p>
    </div>

    <div class="section-title">지금 사용할 수 있는 앱</div>

    <div class="app-grid">
        <a class="app-card" href="./save_log/">
            <div class="icon purple">📥</div>
            <div class="app-info">
                <div class="app-title">Save Log</div>
                <div class="app-desc">링크와 메모를 빠르게 저장하고 태그로 다시 찾기</div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a class="app-card" href="#" onclick="alert('아직 업로드 전이야!')">
            <div class="icon blue">⚡️</div>
            <div class="app-info">
                <div class="app-title">Energy Log</div>
                <div class="app-desc">에너지와 메모를 기록하고 흐름 보기</div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a class="app-card" href="#" onclick="alert('아직 업로드 전이야!')">
            <div class="icon green">🌿</div>
            <div class="app-info">
                <div class="app-title">Emotion Log</div>
                <div class="app-desc">감정과 컨디션을 캘린더로 기록하기</div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a class="app-card" href="#" onclick="alert('아직 업로드 전이야!')">
            <div class="icon yellow">✅</div>
            <div class="app-info">
                <div class="app-title">To-do List</div>
                <div class="app-desc">오늘 할 일과 언젠가 할 일을 정리하기</div>
            </div>
            <div class="arrow">›</div>
        </a>
    </div>

    <div class="footer">
        GitHub Pages로 사용하는 바니의 개인 기록 시스템
    </div>
</div>
</body>
</html>
